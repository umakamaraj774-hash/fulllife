<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <nav class="navbar">

        style="height: 45px; margin-right: 12px; object-fit: contain;">
      FLAG MEDIA

    <!-- Mobile-only Call Button (Top) -->
    <a href="tel:9876543210" class="mobile-call-top" style="display: none; background: var(--primary); color: white; padding: 0.4rem 0.8rem; border-radius: 9999px; text-decoration: none; font-size: 0.8rem; font-weight: 700; align-items: center; gap: 0.3rem;">
      <span>📞</span> Call
    </a>
    <div class="nav-links" style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
      <button onclick="navigateTo('home')">Home</button>
      <button onclick="navigateTo('about')">About</button>
      <button onclick="navigateTo('watch')">Watch</button>
      <button onclick="navigateTo('events_page')">Events</button>
      <button onclick="navigateTo('kids_church')">Kid's Church</button>
      <button onclick="navigateTo('give')">Give</button>
      <button onclick="navigateTo('login')" id="admin-nav-btn">Login</button>
      <button onclick="logout()" id="logout-btn" style="display: none;">Logout</button>
      <a href="https://youtube.com/@fulllifeagchurch?si=nrIxhsDwDnJcVpjC" target="_blank" class="yt-icon"

    <a href="javascript:void(0)" onclick="navigateTo('home')" class="bottom-nav-item">

    <a href="javascript:void(0)" onclick="navigateTo('about')" class="bottom-nav-item">
      <span class="icon">ℹ️</span>
      <span>About</span>
    </a>
    <a href="javascript:void(0)" onclick="navigateTo('watch')" class="bottom-nav-item">
      <span class="icon">🎬</span>
