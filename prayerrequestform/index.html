<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prayer Request - FLAG</title>
  <link rel="stylesheet" href="../styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f8fafc; }
    .footer-link { margin-top: 2rem; text-align: center; }
    .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-container view-active" style="max-width: 800px; margin: 4rem auto; text-align: center;">
      <h2 style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1.5rem;">PRAYER REQUEST</h2>
      <div style="font-size: 1.1rem; line-height: 1.6; color: var(--text-muted); margin-bottom: 2.5rem; padding: 0 1rem;">
          <p>Need prayer? We would love to pray for you. Please fill out the form below and our team will pray for you.</p>
      </div>
      
      <form onsubmit="handleSubmit(event)" class="admin-panel" style="text-align: left; background: white; margin: 0 auto; padding: 2.5rem; border: 1px solid #e2e8f0; border-radius: 1.5rem;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
              <div class="form-group">
                  <label>Name</label>
                  <input type="text" id="prayer-name" placeholder="Enter name" required>
              </div>
              <div class="form-group">
                  <label>DOB</label>
                  <input type="text" id="prayer-dob" placeholder="dd/mm/yyyy" required>
              </div>
              <div class="form-group">
                  <label>Age</label>
                  <input type="number" id="prayer-age" placeholder="Enter your age" required>
              </div>
              <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="prayer-email" placeholder="Enter email address" required>
              </div>
              <div class="form-group">
                  <label>Phone</label>
                  <input type="tel" id="prayer-phone" placeholder="Enter phone number" required>
              </div>
              <div class="form-group">
                  <label>City</label>
                  <input type="text" id="prayer-city" placeholder="Enter City" required>
              </div>
          </div>
          
          <div class="form-group">
              <label>Address</label>
              <input type="text" id="prayer-address" placeholder="Enter address" required>
          </div>
          
          <div class="form-group">
              <label>Prayer Request</label>
              <textarea id="prayer-msg" rows="4" style="width: 100%; padding: 0.75rem; border: 1px solid #CBD5E1; border-radius: 0.5rem; font-family: inherit; font-size: 1rem;" placeholder="Your Prayer Request" required></textarea>
          </div>
          
          <div class="form-group" style="flex-direction: row; align-items: center; gap: 0.75rem;">
              <input type="checkbox" id="prayer-contact" style="width: auto;">
              <label style="margin: 0;">Do you want us to contact you?</label>
          </div>
          
          <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Submit Request</button>
      </form>

      <div class="footer-link">
          <a href="../index.html">← Back to Church Home</a>
      </div>
  </div>

  <script>
    function handleSubmit(event) {
      event.preventDefault();
      
      const newRequest = {
        name: document.getElementById('prayer-name').value,
        dob: document.getElementById('prayer-dob').value,
        age: document.getElementById('prayer-age').value,
        email: document.getElementById('prayer-email').value,
        phone: document.getElementById('prayer-phone').value,
        city: document.getElementById('prayer-city').value,
        address: document.getElementById('prayer-address').value,
        request: document.getElementById('prayer-msg').value,
        contact: document.getElementById('prayer-contact').checked,
        timestamp: new Date().toLocaleString()
      };

      // Save to localStorage so admin can see it
      let requests = JSON.parse(localStorage.getItem('PRAYER_REQUESTS') || '[]');
      requests.push(newRequest);
      localStorage.setItem('PRAYER_REQUESTS', JSON.stringify(requests));

      alert("Thank you " + newRequest.name + ", your prayer request has been sent! Our team will pray for you.");
      window.location.href = "../index.html";
    }
  </script>
</body>
</html>
